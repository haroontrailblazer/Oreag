# Render Blueprint — deploys the FastAPI backend as a Web Service.
# In Render: New + → Blueprint → pick this repo. Then fill the secret env vars.
services:
  - type: web
    name: oreag-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /healthz
    plan: free            # free sleeps after 15 min idle; use "starter" for
                          # uninterrupted background ingestion
    autoDeploy: true
    envVars:
      - key: DATABASE_URL            # Supabase session pooler, postgresql+psycopg://...
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: OPENAI_API_KEY          # required in the cloud (Ollama is localhost-only)
        sync: false
      - key: JWT_MODE
        value: jwks
      - key: CORS_ORIGINS            # your Vercel URL, e.g. https://oreag.vercel.app
        sync: false
